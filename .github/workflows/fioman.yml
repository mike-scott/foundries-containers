# Example: trigger a fioman container/apps Run when the containers repo changes.
# fioman serve fans the change out per arch (streams.yaml containers-arch); each arch's app
# set is attached to the machines of that arch, each inheriting its own OSTree.
# Self-contained — curl only, no external action.
name: container-build
on:
  push:
    branches: [main, stable]   # each branch maps to the stream(s) whose apps build this repo at that ref
jobs:
  trigger:
    runs-on: ubuntu-24.04
    env:
      FIOMAN_SERVER: https://dev.scottml.com
      # Trigger token (FIOMAN_TRIGGER_TOKEN repo secret) scoped to the streams these branches map to,
      # e.g. `fioman trigger register <name> --streams main,stable`. fioman authenticates with it.
      FIOMAN_TOKEN: ${{ secrets.FIOMAN_TRIGGER_TOKEN }}
    steps:
      - name: Trigger + follow fioman Run
        run: |
          set -euo pipefail
          slug="${GITHUB_REPOSITORY##*/}@${GITHUB_SHA::7}"
          # No stream named here: serve resolves it from `repo` + `ref` against streams.yaml (the
          # stream(s) whose apps build this repo at this branch). To force one, add "stream":"<name>".
          resp=$(curl -fsS -X POST "$FIOMAN_SERVER/v1/runs" \
            -H "Authorization: Bearer $FIOMAN_TOKEN" \
            -H 'content-type: application/json' \
            -d "{\"kind\":\"container\",\"slug\":\"$slug\",\"commit_sha\":\"$GITHUB_SHA\",\"ref\":\"$GITHUB_REF_NAME\",\"repo\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY\"}")
          run_id=$(printf '%s' "$resp" | grep -o '"run_id":"[^"]*"' | head -1 | cut -d'"' -f4)
          [ -n "$run_id" ] || { echo "no run_id in response: $resp"; exit 1; }
          echo "queued Run $run_id — following to completion…"

          # Follow the Run: poll its status (readable with the trigger token) until terminal,
          # printing each transition; fail the job if the Run didn't pass.
          prev=""
          while :; do
            body=$(curl -fsS -H "Authorization: Bearer $FIOMAN_TOKEN" "$FIOMAN_SERVER/v1/runs/$run_id")
            status=$(printf '%s' "$body" | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
            [ "$status" != "$prev" ] && { echo "Run $run_id: $status"; prev="$status"; }
            case "$body" in *'"terminal":true'*) break ;; esac
            sleep 15
          done
          echo "Run $run_id finished: $status"
          [ "$status" = passed ] || exit 1
  # The app build (buildx multi-arch + registry layer cache + manifest-list + publish)
  # runs on the provisioned runner — see examples/apps/.
